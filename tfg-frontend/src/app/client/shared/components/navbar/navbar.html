<!-- Overlay oscuro cuando el sidebar está abierto -->
<div
  class="fixed inset-0 bg-black/50 z-40 transition-opacity duration-300"
  [class.opacity-0]="!isOpen()"
  [class.pointer-events-none]="!isOpen()"
  (click)="close()"
  aria-hidden="true"
></div>

<!-- Sidebar -->
<aside
  class="fixed top-0 left-0 h-full w-72 bg-white z-50 shadow-xl transform transition-transform duration-300 ease-in-out flex flex-col"
  [class.-translate-x-full]="!isOpen()"
  [class.translate-x-0]="isOpen()"
  role="navigation"
  [attr.aria-hidden]="!isOpen()"
  aria-label="Menú de navegación principal"
>
  <!-- Header con logo y botón cerrar -->
  <header class="flex items-center justify-between p-4 border-b border-naan-grey/20">
    <a
      routerLink="/"
      class="text-2xl font-bold text-naan-red focus:outline-none focus:ring-2 focus:ring-naan-red focus:ring-offset-2 rounded"
      (click)="close()"
    >
      &#123; NaaN &#125;
    </a>
    <button
      type="button"
      (click)="close()"
      class="p-2 rounded-lg hover:bg-naan-grey/10 focus:outline-none focus:ring-2 focus:ring-naan-red transition-colors"
      aria-label="Cerrar menú de navegación"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-naan-grey"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        aria-hidden="true"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </header>

  <!-- Contenido del menú -->
  <nav class="flex-1 overflow-y-auto py-4">
    <ul class="space-y-1" role="list">
      @for (item of menuItems; track item.label) {
        <li>
          @if (item.children && item.children.length > 0) {
            <!-- Item con submenú desplegable -->
            <button
              type="button"
              class="w-full flex items-center justify-between px-4 py-3 text-left font-semibold text-naan-grey uppercase tracking-wide hover:bg-naan-details/10 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-naan-red transition-colors"
              [attr.aria-expanded]="expandedItems()[item.label] ?? false"
              [attr.aria-controls]="'submenu-' + item.label"
              (click)="toggleSubmenu(item.label)"
            >
              <span>{{ item.label }}</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 transition-transform duration-200"
                [class.rotate-180]="expandedItems()[item.label]"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                aria-hidden="true"
              >
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            <!-- Submenú -->
            <ul
              [id]="'submenu-' + item.label"
              class="overflow-hidden transition-all duration-300 ease-in-out bg-naan-details/5"
              [class.max-h-0]="!expandedItems()[item.label]"
              [class.max-h-screen]="expandedItems()[item.label]"
              role="list"
            >
              @for (child of item.children; track child.label) {
                <li>
                  <a
                    [routerLink]="child.route"
                    class="block px-8 py-2.5 text-naan-grey hover:text-naan-red hover:bg-naan-details/10 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-naan-red transition-colors"
                    (click)="close()"
                  >
                    {{ child.label }}
                  </a>
                </li>
              }
            </ul>
          } @else {
            <!-- Item simple sin submenú -->
            <a
              [routerLink]="item.route"
              class="block px-4 py-3 font-semibold text-naan-grey uppercase tracking-wide hover:bg-naan-details/10 hover:text-naan-red focus:outline-none focus:ring-2 focus:ring-inset focus:ring-naan-red transition-colors"
              (click)="close()"
            >
              {{ item.label }}
            </a>
          }
        </li>
      }
    </ul>
  </nav>

  <!-- Sección de perfil separada -->
  <footer class="border-t border-naan-grey/20 p-4">
    <a
      routerLink="/perfil"
      class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-naan-details/10 focus:outline-none focus:ring-2 focus:ring-naan-red transition-colors group"
      (click)="close()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-naan-grey group-hover:text-naan-red transition-colors"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        aria-hidden="true"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      <span class="font-semibold text-naan-grey uppercase tracking-wide group-hover:text-naan-red transition-colors">
            Perfil
          </span>
    </a>
  </footer>
</aside>
